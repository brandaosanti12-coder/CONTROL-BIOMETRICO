<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Registros</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f4f6f9;
}

h2 {
  text-align: center;
}

table {
  border-collapse: collapse;
  width: 100%;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 10px;
  text-align: center;
}

th {
  background: #007BFF;
  color: white;
}

.rojo {
  color: red;
  font-weight: bold;
}

button {
  padding: 10px 15px;
  margin-bottom: 10px;
  margin-right: 10px;
  cursor: pointer;
}
</style>

</head>
<body>

<h2>Panel de Registros</h2>

<button onclick="exportar()">Descargar Excel</button>

<button onclick="borrarTodo()" style="background:red;color:white;">
  Eliminar todos los registros
</button>

<table>
<thead>
<tr>
  <th>Nombre</th>
  <th>Fecha</th>
  <th>Salida</th>
  <th>Regreso</th>
  <th>Tiempo</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyzE_spj6e0VASt5FP50_5m2Ya-GJloM4",
  authDomain: "registro-bionetrico.firebaseapp.com",
  projectId: "registro-bionetrico",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tabla = document.getElementById("tabla");

// 🔧 FORMATEAR HORA
function formatearHora(timestamp) {
  if (!timestamp || !timestamp.seconds) return "";
  return new Date(timestamp.seconds * 1000).toLocaleTimeString();
}

// ⏱ CALCULAR TIEMPO
function calcularTiempo(salida, regreso) {
  if (!salida || !regreso) return { texto: "", exceso: false };

  const inicio = salida.seconds * 1000;
  const fin = regreso.seconds * 1000;

  const diff = (fin - inicio) / 1000; // segundos

  const minutos = Math.floor(diff / 60);
  const horas = Math.floor(minutos / 60);
  const mins = minutos % 60;

  const texto = `${horas}h ${mins}m`;

  const exceso = minutos > 60;

  return { texto, exceso };
}

// 🔥 CARGAR DATOS
async function cargar() {
  const querySnapshot = await getDocs(collection(db, "registros"));
  tabla.innerHTML = "";

  querySnapshot.forEach(docSnap => {
    const d = docSnap.data();

    const salida = formatearHora(d.salida);
    const regreso = formatearHora(d.regreso);

    const tiempo = calcularTiempo(d.salida, d.regreso);

    tabla.innerHTML += `
      <tr>
        <td>${d.nombre}</td>
        <td>${d.fecha}</td>
        <td>${salida}</td>
        <td>${regreso}</td>
        <td class="${tiempo.exceso ? 'rojo' : ''}">
          ${tiempo.texto}
        </td>
      </tr>
    `;
  });
}

// 📥 EXPORTAR EXCEL
window.exportar = async function () {
  const querySnapshot = await getDocs(collection(db, "registros"));

  let csv = "Nombre;Fecha;Salida;Regreso;Tiempo\n";

  querySnapshot.forEach(docSnap => {
    const d = docSnap.data();

    const salida = formatearHora(d.salida);
    const regreso = formatearHora(d.regreso);
    const tiempo = calcularTiempo(d.salida, d.regreso);

    csv += `${d.nombre};${d.fecha};${salida};${regreso};${tiempo.texto}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "registros.csv";
  a.click();
};

// 🧨 BORRAR TODO
window.borrarTodo = async function () {
  const confirmar = confirm("⚠️ ¿Seguro que deseas eliminar TODOS los registros?");
  if (!confirmar) return;

  const querySnapshot = await getDocs(collection(db, "registros"));

  for (const documento of querySnapshot.docs) {
    await deleteDoc(doc(db, "registros", documento.id));
  }

  alert("Registros eliminados correctamente");
  cargar();
};

// 🚀 INICIAR
cargar();

</script>

</body>
</html>
