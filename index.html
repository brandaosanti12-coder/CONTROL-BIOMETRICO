<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "TU_API_KEY",
  authDomain: "registro-bionetrico.firebaseapp.com",
  projectId: "registro-bionetrico",
});

const db = getFirestore(app);

// 🔧 REFERENCIAS CORRECTAS
const areaSelect = document.getElementById("area");
const nombreSelect = document.getElementById("nombre");
const msg = document.getElementById("msg");

// EMPLEADOS
const empleados = {
  PLAYA: ["LEONARDO FLORES","RENE CHICAIZA","KEVIN ESCOBAR","ESTEBAN MALDONADO","RUBEN YANEZ"],
  FACTURACION: ["STEFANY PISANAN","DIEGO MELENDEZ","ANA MOROCHO","MARLON TENE"],
  OFICINA: ["BRANDON NAVARRETE","ANDRES SUASTE","HECTOR TORRES","IBETH BERMEO","MARIA JOSE CASTRO","MARIA JOSE SANDOVAL","JIMI CELI"]
};

// ✅ AHORA SÍ FUNCIONA
window.cargarEmpleados = function () {
  const area = areaSelect.value;

  nombreSelect.innerHTML = '<option value="">Selecciona tu nombre</option>';

  if (empleados[area]) {
    empleados[area].forEach(n => {
      const opt = document.createElement("option");
      opt.value = n;
      opt.textContent = n;
      nombreSelect.appendChild(opt);
    });
  }
};

window.bloquearSeleccion = function () {
  const nombre = nombreSelect.value;
  const area = areaSelect.value;

  if (!nombre || !area) return;

  localStorage.setItem("empleado", nombre);
  localStorage.setItem("area", area);

  areaSelect.disabled = true;
  nombreSelect.disabled = true;
};

window.marcarSalida = async function () {
  const nombre = localStorage.getItem("empleado");

  if (!nombre) {
    alert("Selecciona tu nombre");
    return;
  }

  const hoy = new Date().toISOString().split("T")[0];

  await setDoc(doc(db, "registros", nombre + "_" + hoy), {
    nombre,
    fecha: hoy,
    salida: serverTimestamp(),
    regreso: null
  });

  msg.innerText = "Salida registrada";
};
</script>
