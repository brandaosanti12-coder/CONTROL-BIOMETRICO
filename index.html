<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Almuerzo</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #007BFF, #00c6ff);
  color: white;
  padding: 50px;
}

.box {
  background: white;
  color: black;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  margin: auto;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

h2 {
  font-size: 28px;
}

select, button {
  font-size: 18px;
  padding: 12px;
  margin: 10px;
  width: 100%;
  border-radius: 8px;
}

button {
  background: #28a745;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #218838;
}

#msg {
  font-size: 18px;
  font-weight: bold;
}

/* 🔥 MENSAJE INFERIOR */
.footer {
  position: fixed;
  bottom: 10px;
  left: 10px;
  font-size: 12px;
  color: rgba(255,255,255,0.9);
  background: rgba(0,0,0,0.2);
  padding: 5px 10px;
  border-radius: 8px;
}
</style>

</head>
<body>

<div class="box">
  <h2>Registro de Almuerzo</h2>

  <!-- 🔽 ÁREA -->
  <select id="area" onchange="cargarEmpleados()">
    <option value="">Selecciona área</option>
    <option value="PLAYA">PLAYA</option>
    <option value="FACTURACION">FACTURACIÓN</option>
    <option value="OFICINA">OFICINA</option>
  </select>

  <!-- 🔽 EMPLEADOS -->
  <select id="nombre">
    <option value="">Selecciona tu nombre</option>
  </select>

  <button onclick="registrar()">Registrar</button>

  <p id="msg"></p>
</div>

<!-- 🔻 MENSAJE -->
<div class="footer">
  Diseñado, elaborado y desarrollado por Navarrete Logistics
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyzE_spj6e0VASt5FP50_5m2Ya-GJloM4",
  authDomain: "registro-bionetrico.firebaseapp.com",
  projectId: "registro-bionetrico",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 EMPLEADOS POR ÁREA
const empleadosPorArea = {
  "PLAYA": [
    "LEONARDO FLORES",
    "RENE CHICAIZA",
    "KEVIN ESCOBAR",
    "ESTEBAN MALDONADO",
    "RUBEN YANEZ"
  ],
  "FACTURACION": [
    "STEFANY PISANAN",
    "DIEGO MELENDEZ",
    "ANA MOROCHO",
    "MARLON TENE"
  ],
  "OFICINA": [
    "BRANDON NAVARRETE",
    "ANDRES SUASTE",
    "HECTOR TORRES",
    "IBETH BERMEO",
    "MARIA JOSE CASTRO",
    "MARIA JOSE SANDOVAL",
    "JIMI CELI"
  ]
};

// 🔄 CARGAR EMPLEADOS
window.cargarEmpleados = function () {
  const area = document.getElementById("area").value;
  const select = document.getElementById("nombre");

  select.innerHTML = '<option value="">Selecciona tu nombre</option>';

  if (empleadosPorArea[area]) {
    empleadosPorArea[area].forEach(nombre => {
      const option = document.createElement("option");
      option.textContent = nombre;
      option.value = nombre;
      select.appendChild(option);
    });
  }
};

// 🧠 REGISTRO
window.registrar = async function () {
  const nombre = document.getElementById("nombre").value;

  if (!nombre) {
    alert("Selecciona tu nombre");
    return;
  }

  const hoy = new Date().toISOString().split("T")[0];
  const ref = doc(db, "registros", nombre + "_" + hoy);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    await setDoc(ref, {
      nombre,
      fecha: hoy,
      salida: serverTimestamp(),
      regreso: null
    });

    document.getElementById("msg").innerText = "Salida registrada correctamente";
  } else {
    const data = snap.data();

    if (!data.regreso) {
      await updateDoc(ref, {
        regreso: serverTimestamp()
      });

      document.getElementById("msg").innerText = "Regreso registrado correctamente";
    } else {
      document.getElementById("msg").innerText = "Ya registraste hoy";
    }
  }
};
</script>

</body>
</html>
