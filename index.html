<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Almuerzo</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #007BFF, #00c6ff);
  color: white;
  padding: 50px;
}

.box {
  background: white;
  color: black;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  margin: auto;
}

select, button {
  font-size: 18px;
  padding: 12px;
  margin: 10px;
  width: 100%;
  border-radius: 8px;
}

button:disabled {
  background: #ccc !important;
}

.footer {
  position: fixed;
  bottom: 10px;
  left: 10px;
  font-size: 12px;
  color: white;
}
</style>

</head>
<body>

<div class="box">
  <h2>Registro de Almuerzo</h2>

  <select id="area" onchange="cargarEmpleados()">
    <option value="">Selecciona área</option>
    <option value="PLAYA">PLAYA</option>
    <option value="FACTURACION">FACTURACIÓN</option>
    <option value="OFICINA">OFICINA</option>
  </select>

  <select id="nombre" onchange="verEstado()">
    <option value="">Selecciona tu nombre</option>
  </select>

  <button id="salidaBtn" onclick="marcarSalida()">Salida</button>
  <button id="retornoBtn" onclick="marcarRetorno()">Retorno</button>

  <p id="msg"></p>
  <p id="horaSalida"></p>
  <p id="horaRetorno"></p>
</div>

<div class="footer">
  Diseñado, elaborado y desarrollado por Navarrete Logistics
</div>

<audio id="audioSalida" src="salida.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyzE_spj6e0VASt5FP50_5m2Ya-GJloM4",
  authDomain: "registro-bionetrico.firebaseapp.com",
  projectId: "registro-bionetrico",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const empleadosPorArea = {
  "PLAYA": ["LEONARDO FLORES","RENE CHICAIZA","KEVIN ESCOBAR","ESTEBAN MALDONADO","RUBEN YANEZ"],
  "FACTURACION": ["STEFANY PISANAN","DIEGO MELENDEZ","ANA MOROCHO","MARLON TENE"],
  "OFICINA": ["BRANDON NAVARRETE","ANDRES SUASTE","HECTOR TORRES","IBETH BERMEO","MARIA JOSE CASTRO","MARIA JOSE SANDOVAL","JIMI CELI"]
};

// 🔄 CARGAR EMPLEADOS
window.cargarEmpleados = function () {
  const area = document.getElementById("area").value;
  const select = document.getElementById("nombre");

  select.innerHTML = '<option value="">Selecciona tu nombre</option>';

  empleadosPorArea[area]?.forEach(n => {
    const opt = document.createElement("option");
    opt.value = n;
    opt.textContent = n;
    select.appendChild(opt);
  });
};

// 🔐 BLOQUEAR SI YA EXISTE USUARIO
window.onload = function() {
  const usuario = localStorage.getItem("empleado");

  if (usuario) {
    document.getElementById("nombre").innerHTML = `<option>${usuario}</option>`;
    document.getElementById("nombre").disabled = true;
    verEstado();
  }
};

// 🔍 VER ESTADO
window.verEstado = async function () {
  const nombre = document.getElementById("nombre").value;
  if (!nombre) return;

  const hoy = new Date().toISOString().split("T")[0];
  const ref = doc(db, "registros", nombre + "_" + hoy);
  const snap = await getDoc(ref);

  const salidaBtn = document.getElementById("salidaBtn");
  const retornoBtn = document.getElementById("retornoBtn");

  salidaBtn.disabled = false;
  retornoBtn.disabled = true;

  if (snap.exists()) {
    const d = snap.data();

    if (d.salida) {
      salidaBtn.disabled = true;
      retornoBtn.disabled = false;
      document.getElementById("horaSalida").innerText =
        "Salida: " + new Date(d.salida.seconds * 1000).toLocaleTimeString();
    }

    if (d.regreso) {
      retornoBtn.disabled = true;
      document.getElementById("horaRetorno").innerText =
        "Retorno: " + new Date(d.regreso.seconds * 1000).toLocaleTimeString();
    }
  }
};

// 🚀 SALIDA
window.marcarSalida = async function () {
  const nombre = document.getElementById("nombre").value;
  if (!nombre) return alert("Selecciona tu nombre");

  // 🔐 GUARDAR USUARIO LOCAL
  localStorage.setItem("empleado", nombre);

  const hoy = new Date().toISOString().split("T")[0];
  const ref = doc(db, "registros", nombre + "_" + hoy);

  await setDoc(ref, {
    nombre,
    fecha: hoy,
    salida: serverTimestamp(),
    regreso: null
  });

  document.getElementById("msg").innerText = "Salida registrada";
  document.getElementById("audioSalida").play();

  verEstado();
};

// 🔁 RETORNO
window.marcarRetorno = async function () {
  const nombre = document.getElementById("nombre").value;

  const hoy = new Date().toISOString().split("T")[0];
  const ref = doc(db, "registros", nombre + "_" + hoy);

  await updateDoc(ref, {
    regreso: serverTimestamp()
  });

  document.getElementById("msg").innerText = "Retorno registrado";

  // 🔓 LIBERAR USUARIO
  localStorage.removeItem("empleado");

  verEstado();
};
</script>

</body>
</html>
